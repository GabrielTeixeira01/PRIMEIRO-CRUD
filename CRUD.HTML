<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD Lista de Tarefas</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: white;
    padding: 30px;
    width: 400px;
    border-radius: 15px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  .input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
  }

  input:focus {
    border-color: #667eea;
  }

  button {
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
  }

  .add-btn {
    background: #667eea;
    color: white;
  }

  .add-btn:hover {
    background: #5563c1;
  }

  ul {
    list-style: none;
  }

  li {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .actions button {
    margin-left: 5px;
  }

  .edit-btn {
    background: #ffc107;
  }

  .delete-btn {
    background: #dc3545;
    color: white;
  }

  .edit-btn:hover {
    opacity: 0.8;
  }

  .delete-btn:hover {
    opacity: 0.8;
  }

</style>
</head>

<body>

<div class="container">
  <h1>Lista de Tarefas</h1>

  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Digite uma tarefa">
    <button class="add-btn" onclick="addTask()">Adicionar</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
  let tasks = [];

  function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      list.innerHTML += `
        <li>
          ${task}
          <div class="actions">
            <button class="edit-btn" onclick="editTask(${index})">Editar</button>
            <button class="delete-btn" onclick="deleteTask(${index})">Excluir</button>
          </div>
        </li>
      `;
    });
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    if (!input.value.trim()) return;

    tasks.push(input.value);
    input.value = "";
    renderTasks();
  }

  function editTask(index) {
    const newTask = prompt("Editar tarefa:", tasks[index]);
    if (newTask !== null && newTask.trim() !== "") {
      tasks[index] = newTask;
      renderTasks();
    }
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    renderTasks();
  }
</script>

</body>
</html>
